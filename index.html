<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Administrador de Sobres</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap">
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background-color: #f4f6f8;
      color: #333;
      margin: 0;
      padding: 10px;
      max-width: 100%;
      margin: auto;
    }
    h1 {
      color: #4a90e2;
      text-align: center;
      margin-bottom: 20px;
      font-size: 24px;
    }
    label, button {
      color: #4a90e2;
      font-weight: 600;
      font-size: 16px;
    }
    button {
      background-color: #4a90e2;
      color: #fff;
      border: none;
      padding: 10px 20px;
      cursor: pointer;
      border-radius: 4px;
      margin-top: 20px;
    }
    button:hover {
      background-color: #357abd;
    }
    #video {
      width: 100%;
      height: 150px;
      margin-bottom: 20px;
    }
    .tabla-datos {
      width: 100%;
      margin-top: 20px;
      border-collapse: collapse;
    }
    .tabla-datos th, .tabla-datos td {
      padding: 10px;
      border: 1px solid #ddd;
      text-align: left;
    }
    .tabla-datos th {
      background-color: #4a90e2;
      color: #fff;
    }
    .total {
      text-align: right;
      font-size: 22px;
      font-weight: bold;
      margin-top: 20px;
    }
    .denominaciones {
      margin-top: 20px;
      font-size: 18px;
      font-weight: bold;
    }
    #scanButton, #downloadButton, #guardarMovimientoBtn {
      display: none;
    }
    .movimiento-bancario {
      margin-top: 40px;
      padding: 20px;
      border: 1px solid #ddd;
      background-color: #fff;
      border-radius: 8px;
    }
    .movimiento-bancario label {
      display: block;
      margin-bottom: 10px;
    }
    .movimiento-bancario input[type="number"] {
      width: calc(100% - 20px);
      padding: 10px;
      margin-bottom: 10px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    .guardar-movimiento {
      background-color: #28a745;
      color: #fff;
      font-weight: 600;
    }
    .guardar-movimiento:hover {
      background-color: #218838;
    }
    .btn-movimiento-bancario {
      background-color: #ff9800;
      color: #fff;
    }
    .btn-movimiento-bancario:hover {
      background-color: #e68900;
    }
  </style>
</head>
<body>
  <h1>Escanear Códigos QR - Administrador</h1>

  <video id="video" autoplay></video>
  <canvas id="canvas" style="display:none;"></canvas>
  <canvas id="canvasDownload" style="display:none;"></canvas>

  <button id="scanButton">Escanear otro código</button>
  <button id="downloadButton">Guardar Datos</button>
  <button class="btn-movimiento-bancario" id="movimientoBancarioBtn">Movimiento Bancario</button>

  <div id="movimientoBancario" class="movimiento-bancario" style="display:none;">
    <label>Grupo en Telecomunicaciones:</label>
    <input type="number" id="grupo1" placeholder="Cantidad 1">
    <input type="number" id="grupo2" placeholder="Cantidad 2">
    <input type="number" id="grupo3" placeholder="Cantidad 3">
    <input type="number" id="grupo4" placeholder="Cantidad 4">
    <input type="number" id="grupo5" placeholder="Cantidad 5">

    <label>Radio Móvil Dipsa:</label>
    <input type="number" id="radio1" placeholder="Cantidad 1">
    <input type="number" id="radio2" placeholder="Cantidad 2">
    <input type="number" id="radio3" placeholder="Cantidad 3">
    <input type="number" id="radio4" placeholder="Cantidad 4">
    <input type="number" id="radio5" placeholder="Cantidad 5">

    <button class="guardar-movimiento" id="guardarMovimientoBtn">Guardar</button>
    <button id="guardarMovimientos">Guardar Movimientos</button>
  </div>

  <table class="tabla-datos" id="tablaResultados" style="display: none;">
    <thead>
      <tr>
        <th>Sucursal</th>
        <th>Fecha</th>
        <th>Total</th>
      </tr>
    </thead>
    <tbody id="tbodyResultados"></tbody>
  </table>

  <p class="total" id="totalAcumulado">Total Acumulado: $0</p>

  <div class="denominaciones">
    <p>Total por Denominaciones:</p>
    <p>$1000: <span id="total1000">0</span></p>
    <p>$500: <span id="total500">0</span></p>
    <p>$200: <span id="total200">0</span></p>
    <p>$100: <span id="total100">0</span></p>
    <p>$50: <span id="total50">0</span></p>
    <p>$20: <span id="total20">0</span></p>
    <p>Monedas: <span id="totalMonedas">0</span></p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/jsqr/dist/jsQR.js"></script>
  <script>
    let totalGeneral = 0;
    let totalBilletes = {
      mil: 0,
      quinientos: 0,
      doscientos: 0,
      cien: 0,
      cincuenta: 0,
      veinte: 0,
      monedas: 0
    };
    let escaneoActivo = true;
    const resultadosTabla = [];

    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const scanButton = document.getElementById('scanButton');
    const downloadButton = document.getElementById('downloadButton');
    const movimientoBancarioBtn = document.getElementById('movimientoBancarioBtn');
    const movimientoBancarioDiv = document.getElementById('movimientoBancario');
    const guardarMovimientoBtn = document.getElementById('guardarMovimientoBtn');
    const guardarMovimientosBtn = document.getElementById('guardarMovimientos');

    navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } }).then(function(stream) {
      video.srcObject = stream;
      video.setAttribute("playsinline", true);
      video.play();
      requestAnimationFrame(tick);
    });

    function tick() {
      if (video.readyState === video.HAVE_ENOUGH_DATA && escaneoActivo) {
        canvas.height = video.videoHeight;
        canvas.width = video.videoWidth;
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const qrCode = jsQR(imageData.data, canvas.width, canvas.height);

        if (qrCode) {
          procesarQR(qrCode.data);
          escaneoActivo = false;
          scanButton.style.display = "block";
          downloadButton.style.display = "block";
        }
      }
      requestAnimationFrame(tick);
    }

    function procesarQR(qrDataText) {
      try {
        const qrData = JSON.parse(qrDataText);

        const tbody = document.getElementById('tbodyResultados');
        const fila = document.createElement('tr');

        const sucursalCell = document.createElement('td');
        sucursalCell.textContent = qrData.sucursal;

        const fechaCell = document.createElement('td');
        fechaCell.textContent = qrData.fecha;

        const totalCell = document.createElement('td');
        totalCell.textContent = `$${qrData.total.toLocaleString('es-MX')}`;

        fila.appendChild(sucursalCell);
        fila.appendChild(fechaCell);
        fila.appendChild(totalCell);
        tbody.appendChild(fila);

        resultadosTabla.push({ sucursal: qrData.sucursal, fecha: qrData.fecha, total: qrData.total });

        document.getElementById('tablaResultados').style.display = 'table';

        totalGeneral += qrData.total;
        document.getElementById('totalAcumulado').textContent = `Total Acumulado: $${totalGeneral.toLocaleString('es-MX')}`;

        totalBilletes.mil += qrData.billetes.mil;
        totalBilletes.quinientos += qrData.billetes.quinientos;
        totalBilletes.doscientos += qrData.billetes.doscientos;
        totalBilletes.cien += qrData.billetes.cien;
        totalBilletes.cincuenta += qrData.billetes.cincuenta;
        totalBilletes.veinte += qrData.billetes.veinte;
        totalBilletes.monedas += qrData.billetes.monedas;

        document.getElementById('total1000').textContent = totalBilletes.mil;
        document.getElementById('total500').textContent = totalBilletes.quinientos;
        document.getElementById('total200').textContent = totalBilletes.doscientos;
        document.getElementById('total100').textContent = totalBilletes.cien;
        document.getElementById('total50').textContent = totalBilletes.cincuenta;
        document.getElementById('total20').textContent = totalBilletes.veinte;
        document.getElementById('totalMonedas').textContent = totalBilletes.monedas;

      } catch (error) {
        alert('No se pudo procesar el código QR. Asegúrate de que el formato sea correcto.');
      }
    }

    scanButton.addEventListener('click', function() {
      escaneoActivo = true;
      scanButton.style.display = "none";
      downloadButton.style.display = "none";
      requestAnimationFrame(tick);
    });

    movimientoBancarioBtn.addEventListener('click', function() {
      movimientoBancarioDiv.style.display = movimientoBancarioDiv.style.display === 'none' ? 'block' : 'none';
    });

    guardarMovimientoBtn.addEventListener('click', function() {
      alert('Datos guardados con éxito');
      const inputs = movimientoBancarioDiv.querySelectorAll('input[type="number"]');
      inputs.forEach(input => input.value = '');
    });

    guardarMovimientosBtn.addEventListener('click', function() {
      const canvasDownload = document.getElementById('canvasDownload');
      const ctxDownload = canvasDownload.getContext('2d');

      const scale = 3;
      const width = 800;
      const height = 1200 + resultadosTabla.length * 40;
      canvasDownload.width = width * scale;
      canvasDownload.height = height * scale;
      ctxDownload.scale(scale, scale);

      ctxDownload.fillStyle = '#fff';
      ctxDownload.fillRect(0, 0, canvasDownload.width, canvasDownload.height);

      ctxDownload.fillStyle = '#000';
      ctxDownload.font = 'bold 24px Poppins';
      ctxDownload.fillText('Movimientos', 250, 40);

      ctxDownload.font = 'bold 18px Poppins';
      const fechaActual = new Date();
      const dia = String(fechaActual.getDate()).padStart(2, '0');
      const mes = String(fechaActual.getMonth() + 1).padStart(2, '0');
      const anio = fechaActual.getFullYear();
      ctxDownload.fillText(`Fecha: ${dia}-${mes}-${anio}`, 50, 80);

      let startY = 120;
      let granTotal = 0;

      function procesarDepositos(titulo, ids) {
        let subtotal = 0;
        ctxDownload.font = 'bold 18px Poppins';
        ctxDownload.fillText(titulo, 50, startY);
        startY += 30;

        ids.forEach(id => {
          const value = parseFloat(document.getElementById(id).value) || 0;
          if (value > 0) {
            ctxDownload.font = '16px Poppins';
            ctxDownload.fillText(`$${value.toLocaleString('es-MX')}`, 50, startY);
            startY += 30;
            subtotal += value;
          }
        });

        if (subtotal > 0) {
          ctxDownload.font = 'bold 18px Poppins';
          ctxDownload.fillText(`Total: $${subtotal.toLocaleString('es-MX')}`, 50, startY);
          startY += 40;
          granTotal += subtotal;
        }
      }

      procesarDepositos('GRUPO EN TELECOMUNICACIONES', ['grupo1', 'grupo2', 'grupo3', 'grupo4', 'grupo5']);
      procesarDepositos('RADIO MÓVIL DIPSA', ['radio1', 'radio2', 'radio3', 'radio4', 'radio5']);

      ctxDownload.font = 'bold 24px Poppins';
      ctxDownload.fillStyle = '#e68900';
      ctxDownload.fillText(`Gran Total: $${granTotal.toLocaleString('es-MX')}`, 50, startY);

      // Añadir el tabulador de billetes usados basado en QR escaneados
      ctxDownload.fillStyle = '#000';
      ctxDownload.font = 'bold 18px Poppins';
      startY += 60;
      ctxDownload.fillText('Tabulador de Billetes Usados:', 50, startY);
      startY += 30;
      ctxDownload.font = '16px Poppins';
      ctxDownload.fillText(`$1000: ${totalBilletes.mil}`, 50, startY);
      startY += 20;
      ctxDownload.fillText(`$500: ${totalBilletes.quinientos}`, 50, startY);
      startY += 20;
      ctxDownload.fillText(`$200: ${totalBilletes.doscientos}`, 50, startY);
      startY += 20;
      ctxDownload.fillText(`$100: ${totalBilletes.cien}`, 50, startY);
      startY += 20;
      ctxDownload.fillText(`$50: ${totalBilletes.cincuenta}`, 50, startY);
      startY += 20;
      ctxDownload.fillText(`$20: ${totalBilletes.veinte}`, 50, startY);
      startY += 20;
      ctxDownload.fillText(`Monedas: ${totalBilletes.monedas}`, 50, startY);

      const link = document.createElement('a');
      link.download = `MOVIMIENTOS - ${dia}-${mes}-${anio}.png`;
      link.href = canvasDownload.toDataURL();
      link.click();
    });
  </script>
</body>
</html>
