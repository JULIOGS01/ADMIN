<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Administrador de Sobres</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Fuentes y estilos -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap">
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background-color: #f4f6f8;
      color: #333;
      margin: 0;
      padding: 20px;
      max-width: 900px;
      margin: auto;
    }
    h1 {
      color: #4a90e2;
      text-align: center;
      margin-bottom: 20px;
      font-size: 24px;
    }
    label {
      color: #4a90e2;
      font-weight: 600;
      font-size: 16px;
    }
    button {
      background-color: #4a90e2;
      color: #fff;
      border: none;
      padding: 10px 20px;
      cursor: pointer;
      font-weight: 600;
      font-size: 16px;
      border-radius: 4px;
      margin-top: 20px;
    }
    button:hover {
      background-color: #357abd;
    }
    #video {
      width: 100%;
      height: auto;
      margin-bottom: 20px;
    }
    .form-section {
      margin-bottom: 20px;
      padding: 15px;
      background-color: #fff;
      border: 1px solid #ddd;
    }
    .tabla-datos {
      width: 100%;
      margin-top: 20px;
      border-collapse: collapse;
    }
    .tabla-datos th, .tabla-datos td {
      padding: 10px;
      border: 1px solid #ddd;
      text-align: left;
    }
    .tabla-datos th {
      background-color: #4a90e2;
      color: #fff;
    }
    .total {
      text-align: right;
      font-size: 22px;
      font-weight: bold;
      margin-top: 20px;
    }
    .denominaciones {
      margin-top: 20px;
      font-size: 18px;
      font-weight: bold;
    }
    .notification {
      color: green;
      font-size: 16px;
      margin-top: 10px;
      display: none;
    }
  </style>
</head>
<body>
  <h1>Escanear Códigos QR - Administrador</h1>

  <video id="video" autoplay></video>
  <canvas id="canvas" style="display:none;"></canvas>
  <canvas id="canvasDownload" style="display:none;"></canvas> 

  <button id="scanButton">Escanear otro código</button>
  <button id="downloadDataButton">Guardar Datos</button>
  <button id="bankMovementButton">Movimiento Bancario</button>
  <button id="downloadMovementButton" style="display:none;">Descargar Movimientos</button> 

  <div id="notification" class="notification">Movimiento guardado correctamente</div> 

  <!-- Formulario de movimientos bancarios -->
  <div id="bankMovementForm" style="display:none;">
    <div class="form-section">
      <h2>RADIO MÓVIL DIPSA</h2>
      <label for="radioAmount1">Cantidad 1:</label>
      <input type="number" id="radioAmount1" name="radioAmount1"><br>
      <label for="radioAmount2">Cantidad 2:</label>
      <input type="number" id="radioAmount2" name="radioAmount2"><br>
      <label for="radioAmount3">Cantidad 3:</label>
      <input type="number" id="radioAmount3" name="radioAmount3"><br>
      <label for="radioAmount4">Cantidad 4:</label>
      <input type="number" id="radioAmount4" name="radioAmount4"><br>
      <label for="radioAmount5">Cantidad 5:</label>
      <input type="number" id="radioAmount5" name="radioAmount5"><br>
    </div>

    <div class="form-section">
      <h2>GRUPO EN TELECOMUNICACIONES</h2>
      <label for="grupoAmount1">Cantidad 1:</label>
      <input type="number" id="grupoAmount1" name="grupoAmount1"><br>
      <label for="grupoAmount2">Cantidad 2:</label>
      <input type="number" id="grupoAmount2" name="grupoAmount2"><br>
      <label for="grupoAmount3">Cantidad 3:</label>
      <input type="number" id="grupoAmount3" name="grupoAmount3"><br>
      <label for="grupoAmount4">Cantidad 4:</label>
      <input type="number" id="grupoAmount4" name="grupoAmount4"><br>
      <label for="grupoAmount5">Cantidad 5:</label>
      <input type="number" id="grupoAmount5" name="grupoAmount5"><br>
    </div>

    <button id="saveMovementButton">Guardar movimiento</button>
  </div>

  <!-- Tabla de resultados -->
  <table class="tabla-datos" id="tablaResultados" style="display: none;">
    <thead>
      <tr>
        <th>Sucursal</th>
        <th>Fecha</th>
        <th>Total</th>
      </tr>
    </thead>
    <tbody id="tbodyResultados"></tbody>
  </table>

  <p class="total" id="totalAcumulado">Total Acumulado: $0</p>

  <div class="denominaciones">
    <p id="denominacionesTotal">Total por Denominaciones:</p>
    <p>$1000: <span id="total1000">0</span></p>
    <p>$500: <span id="total500">0</span></p>
    <p>$200: <span id="total200">0</span></p>
    <p>$100: <span id="total100">0</span></p>
    <p>$50: <span id="total50">0</span></p>
    <p>$20: <span id="total20">0</span></p>
    <p>Monedas: <span id="totalMonedas">0</span></p>
  </div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/jsqr/dist/jsQR.js"></script>
  <script>
    let totalGeneral = 0;
    let totalBilletes = {
      mil: 0,
      quinientos: 0,
      doscientos: 0,
      cien: 0,
      cincuenta: 0,
      veinte: 0,
      monedas: 0
    };
    let escaneoActivo = true;
    const resultadosTabla = [];
    let movimientos = {
      radio: [],
      grupo: []
    };

    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const scanButton = document.getElementById('scanButton');
    const downloadDataButton = document.getElementById('downloadDataButton');
    const bankMovementButton = document.getElementById('bankMovementButton');
    const bankMovementForm = document.getElementById('bankMovementForm');
    const saveMovementButton = document.getElementById('saveMovementButton');
    const downloadMovementButton = document.getElementById('downloadMovementButton');
    const notification = document.getElementById('notification');

    // Iniciar la cámara
    navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
    .then(function(stream) {
      video.srcObject = stream;
      video.setAttribute("playsinline", true);
      video.play();
      requestAnimationFrame(tick);
    })
    .catch(function(err) {
      console.error("Error al acceder a la cámara: ", err);
      alert("No se pudo acceder a la cámara. Asegúrate de que los permisos estén activados.");
    });

    function tick() {
      if (video.readyState === video.HAVE_ENOUGH_DATA && escaneoActivo) {
        canvas.height = video.videoHeight;
        canvas.width = video.videoWidth;
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const qrCode = jsQR(imageData.data, canvas.width, canvas.height);

        if (qrCode) {
          procesarQR(qrCode.data);
          escaneoActivo = false;  
          scanButton.style.display = "block";
          downloadDataButton.style.display = "block";
          bankMovementButton.style.display = "block";
        }
      }
      requestAnimationFrame(tick);
    }

    function procesarQR(qrDataText) {
      try {
        const qrData = JSON.parse(qrDataText);

        const tbody = document.getElementById('tbodyResultados');
        const fila = document.createElement('tr');

        const sucursalCell = document.createElement('td');
        sucursalCell.textContent = qrData.sucursal;

        const fechaCell = document.createElement('td');
        fechaCell.textContent = qrData.fecha;

        const totalCell = document.createElement('td');
        totalCell.textContent = `$${qrData.total.toLocaleString('es-MX')}`;

        fila.appendChild(sucursalCell);
        fila.appendChild(fechaCell);
        fila.appendChild(totalCell);
        tbody.appendChild(fila);

        resultadosTabla.push({ sucursal: qrData.sucursal, fecha: qrData.fecha, total: qrData.total });

        document.getElementById('tablaResultados').style.display = 'table';

        totalGeneral += qrData.total;
        document.getElementById('totalAcumulado').textContent = `Total Acumulado: $${totalGeneral.toLocaleString('es-MX')}`;

        totalBilletes.mil += qrData.billetes.mil;
        totalBilletes.quinientos += qrData.billetes.quinientos;
        totalBilletes.doscientos += qrData.billetes.doscientos;
        totalBilletes.cien += qrData.billetes.cien;
        totalBilletes.cincuenta += qrData.billetes.cincuenta;
        totalBilletes.veinte += qrData.billetes.veinte;
        totalBilletes.monedas += qrData.billetes.monedas;

        document.getElementById('total1000').textContent = totalBilletes.mil;
        document.getElementById('total500').textContent = totalBilletes.quinientos;
        document.getElementById('total200').textContent = totalBilletes.doscientos;
        document.getElementById('total100').textContent = totalBilletes.cien;
        document.getElementById('total50').textContent = totalBilletes.cincuenta;
        document.getElementById('total20').textContent = totalBilletes.veinte;
        document.getElementById('totalMonedas').textContent = totalBilletes.monedas;

      } catch (error) {
        alert('No se pudo procesar el código QR.');
      }
    }

    scanButton.addEventListener('click', function() {
      escaneoActivo = true;  
      scanButton.style.display = "none"; 
      downloadDataButton.style.display = "none"; 
      bankMovementButton.style.display = "none";
      requestAnimationFrame(tick);
    });

    bankMovementButton.addEventListener('click', function() {
      bankMovementForm.style.display = 'block';
    });

    saveMovementButton.addEventListener('click', function() {
      const radioAmounts = [
        parseInt(document.getElementById('radioAmount1').value) || 0,
        parseInt(document.getElementById('radioAmount2').value) || 0,
        parseInt(document.getElementById('radioAmount3').value) || 0,
        parseInt(document.getElementById('radioAmount4').value) || 0,
        parseInt(document.getElementById('radioAmount5').value) || 0
      ];

      const grupoAmounts = [
        parseInt(document.getElementById('grupoAmount1').value) || 0,
        parseInt(document.getElementById('grupoAmount2').value) || 0,
        parseInt(document.getElementById('grupoAmount3').value) || 0,
        parseInt(document.getElementById('grupoAmount4').value) || 0,
        parseInt(document.getElementById('grupoAmount5').value) || 0
      ];

      movimientos.radio = radioAmounts.filter(amount => amount > 0);
      movimientos.grupo = grupoAmounts.filter(amount => amount > 0);

      notification.style.display = 'block'; 
      setTimeout(() => { notification.style.display = 'none'; }, 3000);

      downloadMovementButton.style.display = 'block'; 

      // Limpiar campos
      document.getElementById('radioAmount1').value = '';
      document.getElementById('radioAmount2').value = '';
      document.getElementById('radioAmount3').value = '';
      document.getElementById('radioAmount4').value = '';
      document.getElementById('radioAmount5').value = '';
      document.getElementById('grupoAmount1').value = '';
      document.getElementById('grupoAmount2').value = '';
      document.getElementById('grupoAmount3').value = '';
      document.getElementById('grupoAmount4').value = '';
      document.getElementById('grupoAmount5').value = '';
    });

    downloadMovementButton.addEventListener('click', function() {
      const canvas = document.getElementById('canvasDownload');
      const ctx = canvas.getContext('2d');

      const scale = 3;
      const width = 800;
      let height = 400; 

      let lines = 5;
      if (movimientos.radio.length > 0) {
        lines += movimientos.radio.length + 2;
      }
      if (movimientos.grupo.length > 0) {
        lines += movimientos.grupo.length + 2;
      }
      lines += 2;

      height = lines * 30;

      canvas.width = width * scale;
      canvas.height = height * scale;
      ctx.scale(scale, scale);

      ctx.fillStyle = '#fff';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.fillStyle = '#4a90e2';
      ctx.font = 'bold 28px Poppins';
      ctx.fillText('Movimientos', 50, 50);

      const fechaActual = new Date();
      const dia = String(fechaActual.getDate()).padStart(2, '0');
      const mes = String(fechaActual.getMonth() + 1).padStart(2, '0');
      const anio = fechaActual.getFullYear();
      ctx.font = 'bold 20px Poppins';
      ctx.fillText(`${dia}-${mes}-${anio}`, 50, 90);

      let startY = 130;
      let granTotal = 0;

      if (movimientos.radio.length > 0) {
        const radioTotal = movimientos.radio.reduce((a, b) => a + b, 0);
        granTotal += radioTotal;

        ctx.fillStyle = '#000';
        ctx.font = 'bold 22px Poppins';
        ctx.fillText('RADIO MÓVIL DIPSA', 50, startY);

        ctx.font = '16px Poppins';
        movimientos.radio.forEach((amount, i) => {
          ctx.fillText(`$${amount.toLocaleString('es-MX')}`, 70, startY + (i + 1) * 25);
        });

        startY += movimientos.radio.length * 25 + 30; 
        ctx.font = 'bold 16px Poppins';
        ctx.fillText(`Total: $${radioTotal.toLocaleString('es-MX')}`, 50, startY);
        startY += 40;
      }

      if (movimientos.grupo.length > 0) {
        const grupoTotal = movimientos.grupo.reduce((a, b) => a + b, 0);
        granTotal += grupoTotal;

        ctx.fillStyle = '#000';
        ctx.font = 'bold 22px Poppins';
        ctx.fillText('GRUPO EN TELECOMUNICACIONES', 50, startY);

        ctx.font = '16px Poppins';
        movimientos.grupo.forEach((amount, i) => {
          ctx.fillText(`$${amount.toLocaleString('es-MX')}`, 70, startY + (i + 1) * 25);
        });

        startY += movimientos.grupo.length * 25 + 30; 
        ctx.font = 'bold 16px Poppins';
        ctx.fillText(`Total: $${grupoTotal.toLocaleString('es-MX')}`, 50, startY);
        startY += 40;
      }

      ctx.font = 'bold 24px Poppins';
      ctx.fillText(`Gran Total: $${granTotal.toLocaleString('es-MX')}`, 500, startY + 20); // Colocado a la derecha

      const link = document.createElement('a');
      link.download = `MOVIMIENTOS - ${dia}-${mes}-${anio}.png`;
      link.href = canvas.toDataURL();
      link.click();
    });

  </script>
</body>
</html>
