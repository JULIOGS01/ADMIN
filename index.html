<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Movimientos Bancarios</title>
  
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap">
  
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background-color: #f4f6f8;
      color: #333;
      margin: 0;
      padding: 20px;
      max-width: 900px;
      margin: auto;
    }
    h1 {
      color: #4a90e2;
      text-align: center;
      margin-bottom: 20px;
      font-size: 24px;
    }
    label {
      color: #4a90e2;
      font-weight: 600;
      font-size: 16px;
    }
    button {
      background-color: #4a90e2;
      color: #fff;
      border: none;
      padding: 10px 20px;
      cursor: pointer;
      font-weight: 600;
      font-size: 16px;
      border-radius: 4px;
      margin-top: 20px;
    }
    button:hover {
      background-color: #357abd;
    }
    .form-section {
      margin-bottom: 20px;
      padding: 15px;
      background-color: #fff;
      border: 1px solid #ddd;
    }
    .total {
      text-align: right;
      font-size: 22px;
      font-weight: bold;
      margin-top: 20px;
    }
    .notification {
      color: green;
      font-size: 16px;
      margin-top: 10px;
      display: none;
    }
  </style>
</head>
<body>
  <h1>Movimientos Bancarios</h1>

  <div class="form-section">
    <h2>Radio Móvil Dipsa</h2>
    <label for="radioAmount1">Cantidad 1:</label>
    <input type="number" id="radioAmount1" name="radioAmount1"><br>
    <label for="radioAmount2">Cantidad 2:</label>
    <input type="number" id="radioAmount2" name="radioAmount2"><br>
    <label for="radioAmount3">Cantidad 3:</label>
    <input type="number" id="radioAmount3" name="radioAmount3"><br>
    <label for="radioAmount4">Cantidad 4:</label>
    <input type="number" id="radioAmount4" name="radioAmount4"><br>
    <label for="radioAmount5">Cantidad 5:</label>
    <input type="number" id="radioAmount5" name="radioAmount5"><br>
  </div>

  <div class="form-section">
    <h2>Grupo en Telecomunicaciones</h2>
    <label for="grupoAmount1">Cantidad 1:</label>
    <input type="number" id="grupoAmount1" name="grupoAmount1"><br>
    <label for="grupoAmount2">Cantidad 2:</label>
    <input type="number" id="grupoAmount2" name="grupoAmount2"><br>
    <label for="grupoAmount3">Cantidad 3:</label>
    <input type="number" id="grupoAmount3" name="grupoAmount3"><br>
    <label for="grupoAmount4">Cantidad 4:</label>
    <input type="number" id="grupoAmount4" name="grupoAmount4"><br>
    <label for="grupoAmount5">Cantidad 5:</label>
    <input type="number" id="grupoAmount5" name="grupoAmount5"><br>
  </div>

  <button id="generateButton">Generar Movimiento</button>
  <button id="downloadButton" style="display:none;">Descargar Movimientos</button>

  <div id="notification" class="notification">Movimiento guardado correctamente</div>

  <script>
    const generateButton = document.getElementById('generateButton');
    const downloadButton = document.getElementById('downloadButton');
    const notification = document.getElementById('notification');
    let radioTotal = 0;
    let grupoTotal = 0;

    generateButton.addEventListener('click', function() {
      const radioAmounts = [
        parseInt(document.getElementById('radioAmount1').value) || 0,
        parseInt(document.getElementById('radioAmount2').value) || 0,
        parseInt(document.getElementById('radioAmount3').value) || 0,
        parseInt(document.getElementById('radioAmount4').value) || 0,
        parseInt(document.getElementById('radioAmount5').value) || 0
      ];

      const grupoAmounts = [
        parseInt(document.getElementById('grupoAmount1').value) || 0,
        parseInt(document.getElementById('grupoAmount2').value) || 0,
        parseInt(document.getElementById('grupoAmount3').value) || 0,
        parseInt(document.getElementById('grupoAmount4').value) || 0,
        parseInt(document.getElementById('grupoAmount5').value) || 0
      ];

      // Sumar las cantidades ingresadas para cada opción
      radioTotal = radioAmounts.reduce((a, b) => a + b, 0);
      grupoTotal = grupoAmounts.reduce((a, b) => a + b, 0);

      notification.style.display = 'block'; 
      setTimeout(() => { notification.style.display = 'none'; }, 3000);

      downloadButton.style.display = 'block'; 
    });

    downloadButton.addEventListener('click', function() {
      const canvas = document.createElement('canvas');
      const ctx = canvas.getContext('2d');

      const scale = 3;
      const width = 800;
      const height = 400; 
      canvas.width = width * scale;
      canvas.height = height * scale;
      ctx.scale(scale, scale);

      // Fondo blanco
      ctx.fillStyle = '#fff';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Título y fecha
      ctx.fillStyle = '#4a90e2';
      ctx.font = 'bold 28px Poppins';
      ctx.fillText('Movimientos', 50, 60);

      const fechaActual = new Date();
      const dia = String(fechaActual.getDate()).padStart(2, '0');
      const mes = String(fechaActual.getMonth() + 1).padStart(2, '0');
      const anio = fechaActual.getFullYear();
      ctx.font = 'bold 20px Poppins';
      ctx.fillText(`${dia}-${mes}-${anio}`, 50, 120);

      let startY = 170;

      // Mostrar Radio Móvil Dipsa si tiene cantidades
      if (radioTotal > 0) {
        ctx.fillStyle = '#000';
        ctx.font = 'bold 20px Poppins';
        ctx.fillText('Radio Móvil Dipsa', 50, startY);

        ctx.font = '16px Poppins';
        const radioAmounts = [
          document.getElementById('radioAmount1').value || 0,
          document.getElementById('radioAmount2').value || 0,
          document.getElementById('radioAmount3').value || 0,
          document.getElementById('radioAmount4').value || 0,
          document.getElementById('radioAmount5').value || 0
        ];

        radioAmounts.forEach((amount, i) => {
          if (amount > 0) {
            ctx.fillText(`$${parseInt(amount).toLocaleString('es-MX')}`, 70, startY + (i + 1) * 25);
          }
        });

        startY += 150; 
        ctx.font = 'bold 16px Poppins';
        ctx.fillText(`Total a Radio Móvil Dipsa: $${radioTotal.toLocaleString('es-MX')}`, 50, startY);
        startY += 50;
      }

      // Mostrar Grupo en Telecomunicaciones si tiene cantidades
      if (grupoTotal > 0) {
        ctx.fillStyle = '#000';
        ctx.font = 'bold 20px Poppins';
        ctx.fillText('Grupo en Telecomunicaciones', 50, startY);

        ctx.font = '16px Poppins';
        const grupoAmounts = [
          document.getElementById('grupoAmount1').value || 0,
          document.getElementById('grupoAmount2').value || 0,
          document.getElementById('grupoAmount3').value || 0,
          document.getElementById('grupoAmount4').value || 0,
          document.getElementById('grupoAmount5').value || 0
        ];

        grupoAmounts.forEach((amount, i) => {
          if (amount > 0) {
            ctx.fillText(`$${parseInt(amount).toLocaleString('es-MX')}`, 70, startY + (i + 1) * 25);
          }
        });

        startY += 150; 
        ctx.font = 'bold 16px Poppins';
        ctx.fillText(`Total a Grupo en Telecomunicaciones: $${grupoTotal.toLocaleString('es-MX')}`, 50, startY);
        startY += 50;
      }

      // Gran Total
      const granTotal = radioTotal + grupoTotal;
      ctx.font = 'bold 24px Poppins';
      ctx.fillText(`Gran Total: $${granTotal.toLocaleString('es-MX')}`, 50, startY + 50);

      // Descargar la imagen
      const link = document.createElement('a');
      link.download = `MOVIMIENTOS - ${dia}-${mes}-${anio}.png`;
      link.href = canvas.toDataURL();
      link.click();
    });
  </script>
</body>
</html>
